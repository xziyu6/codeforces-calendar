name: Package Chrome Extension

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../codeforces-calendar-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeforces-calendar-extension
          path: codeforces-calendar-extension.zip
