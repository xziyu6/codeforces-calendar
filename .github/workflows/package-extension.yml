name: Package Chrome Extension

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Zip extension
        run: |
          rm -f codeforces-calendar.zip
          cd dist
          zip -r ../codeforces-calendar.zip . -x "*.zip"

      - name: Verify zip root contains manifest
        run: |
          unzip -l codeforces-calendar.zip | grep "manifest.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeforces-calendar
          path: codeforces-calendar.zip
